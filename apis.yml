aid: moodys-corporation
name: Moody's Corporation
description: >-
  Moody's Corporation (NYSE: MCO) is a global integrated risk-assessment firm
  operating through two segments: Moody's Ratings (Moody's Investors Service),
  which publishes credit ratings and assessment services on debt obligations,
  and Moody's Analytics, which provides data, software, research, and APIs
  spanning economic data, credit risk, KYC/AML, ESG, climate, and catastrophe
  modeling. Moody's Analytics products are exposed through multiple developer
  APIs and a portal at developer.moodys.com, with deeper API surfaces published
  at api.economy.com (Data Buffet, Scenario Studio, AutoCycle, ECCL) and
  through subsidiary brands including Bureau van Dijk (Orbis), RMS (catastrophe
  risk), Kompany / Passfort (KYC), and Four Twenty Seven (climate).
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://github.com/api-evangelist/moodys-corporation/blob/main/apis.yml
modified: '2026-05-23'
specificationVersion: '0.16'
tags:
- Analytics
- Catastrophe Risk
- Climate Risk
- Compliance
- Credit Ratings
- Economic Data
- ESG
- Financial Data
- KYC
- Risk

