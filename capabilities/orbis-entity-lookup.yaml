name: orbis-entity-lookup
title: Moody's Orbis Entity Lookup
description: >-
  Resolve a legal entity in the Orbis (Bureau van Dijk) company database by
  name, registration number, or LEI; return company financials, officers,
  beneficial owners, and corporate family-tree context for KYC, credit, and
  third-party-risk workflows.
provider: moodys-corporation
api: moodys-orbis-api
version: 0.1.0

inputs:
  - name: name
    type: string
    required: false
  - name: country
    type: string
    required: false
  - name: registration_number
    type: string
    required: false
  - name: lei
    type: string
    required: false

outputs:
  - name: entity
    type: object
    description: Resolved Orbis entity record.
  - name: ownership
    type: array
    description: Beneficial-owner / shareholder chain.

operations:
  - operationId: searchEntities
    method: GET
    path: /entities/search
  - operationId: getEntity
    method: GET
    path: /entities/{bvdId}
  - operationId: getOwnership
    method: GET
    path: /entities/{bvdId}/ownership

failure_modes:
  - code: not_found
    description: No Orbis match for the provided identifiers.
  - code: ambiguous
    description: Multiple candidate matches; refine query.
